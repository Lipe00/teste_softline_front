<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Softline :: Cliente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="js/API_KEY.js"></script>
</head>

<body class="bg-light">

<div id="navbar-container"></div>

<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 id="titulo-form">Cadastrar Cliente</h4>
            <hr>

            <form id="form-cliente">

                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nome Fantasia</label>
                    <input type="text" class="form-control" id="fantasyName" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Documento</label>
                    <input type="text"
                        class="form-control"
                        id="document"
                        inputmode="numeric"
                        maxlength="18"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Endereço</label>
                    <input type="text" class="form-control" id="address" required>
                </div>

                <button type="submit" class="btn btn-success">Salvar</button>
                <button type="button" class="btn btn-secondary"
                        onclick="window.location.href='clientes.html'">
                    Cancelar
                </button>

            </form>

        </div>
    </div>

</div>

<script src="./js/api.js"></script>
<script>

// ======================
// Variáveis globais
// ======================
const token = localStorage.getItem("token");
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const API_URL = API_BASE + "/Client";

// ======================
// Inicialização
// ======================
$(document).ready(function () {

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    $("#navbar-container").load("navbar.html");

    if (id) {
        $("#titulo-form").text("Editar Cliente");
        carregarCliente(id);
    }

    $("#form-cliente").submit(function (e) {
        e.preventDefault();

        if (id) {
            atualizarCliente(id);
        } else {
            criarCliente();
        }
    });

    $("#document").on("input", function() {
        let val = $(this).val().replace(/\D/g, ''); // remove tudo que não é número

        if (val.length > 14) val = val.slice(0, 14); // corta o excesso

        // Aplica máscara
        if (val.length <= 11) { // CPF
            val = val
                .replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        } else { // CNPJ
            val = val
                .replace(/^(\d{2})(\d)/, "$1.$2")
                .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
                .replace(/\.(\d{3})(\d)/, ".$1/$2")
                .replace(/(\d{4})(\d{1,2})$/, "$1-$2");
        }

        $(this).val(val);
    });
});

// ======================
// Funções
// ======================

function carregarCliente(id) {

    $.ajax({
        url: API_URL + "/" + id,
        type: "GET",
        success: function (c) {
            console.log(c)
            $("#name").val(c.name);
            $("#fantasyName").val(c.fantasy_name);
            let doc = (c.document || "").replace(/\D/g, "");
            $("#document").val(doc).trigger("input");
            $("#address").val(c.address);
        },
        error: function () {
            alert("Erro ao carregar cliente");
        }
    });
}

function criarCliente() {

    const cliente = pegarDadosFormulario();

    $.ajax({
        url: API_URL,
        type: "POST",
        contentType: "application/json",
        headers: {
            "Authorization": "Bearer " + token
        },
        data: JSON.stringify(cliente),
        success: function () {
            alert("Cliente cadastrado com sucesso!");
            window.location.href = "clientes.html";
        },
        error: function () {
            alert("Erro ao cadastrar cliente.");
        }
    });
}


function atualizarCliente(id) {

    const cliente = pegarDadosFormulario();

    $.ajax({
        url: API_URL + "/" + id,
        type: "PUT",
        contentType: "application/json",
        data: JSON.stringify(cliente),
        success: function () {
            alert("Cliente atualizado com sucesso!");
            window.location.href = "clientes.html";
        },
        error: function () {
            alert("Erro ao atualizar cliente.");
        }
    });
}


function pegarDadosFormulario() {
    let doc = $("#document").val().replace(/\D/g, "");

    return {
        name: $("#name").val(),
        fantasy_name: $("#fantasyName").val(),
        document: doc,
        address: $("#address").val(),
    };
}

$(document).ajaxError(function (event, xhr) {
    if (xhr.status === 401) {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }
});

</script>

</body>
</html>
