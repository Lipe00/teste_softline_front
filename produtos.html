<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Softline :: Produtos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="js/API_KEY.js"></script>

</head>

<body class="bg-light">
    <div id="navbar-container"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Lista de Produtos</h3>
        <button class="btn btn-primary"
            onclick="window.location.href='produto-form.html'">
            + Novo Produto
        </button>
    </div>
    

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-hover table-bordered align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Código de Barras</th>
                        <th>Valor Venda</th>
                        <th>Peso Bruto</th>
                        <th>Peso Líquido</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos">
                </tbody>
            </table>

            <nav>
                <ul class="pagination justify-content-center" id="paginacao"></ul>
            </nav>

        </div>
    </div>

</div>

<script>

const token = localStorage.getItem("token");
const pageSize = 15;
let currentPage = 1;



$(document).ready(function () {

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    $("#navbar-container").load("navbar.html");

    carregarProdutos(currentPage);
});


function editarProduto(id) {
    window.location.href = "produto-form.html?id=" + id;
}


function deletarProduto(id) {

    if (!confirm("Tem certeza que deseja excluir este produto?"))
        return;

    $.ajax({
        url: API_BASE + "/Product/" + id,
        type: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        },
        success: function () {
            alert("Produto excluído com sucesso!");
            carregarProdutos(currentPage);
        },
        error: function () {
            alert("Erro ao excluir produto.");
        }
    });
}


function carregarProdutos(page) {

    $.ajax({
        url: API_BASE + "/Product/paged?page=" + page + "&pageSize=" + pageSize,
        type: "GET",
        headers: {
            "Authorization": "Bearer " + token
        },
        success: function (response) {

            const produtos = response.data || response;
            const totalPages = response.totalPages || 1;

            $("#tabela-produtos").empty();

            produtos.forEach(p => {
                $("#tabela-produtos").append(`
                    <tr>
                        <td>${p.code}</td>
                        <td>${p.barCode}</td>
                        <td>
                            R$
                            ${Number(p.price).toLocaleString('pt-BR', { 
                                minimumFractionDigits: 2, 
                                maximumFractionDigits: 2 
                            })}
                        </td>
                        <td>
                            ${Number(p.grossWeight).toLocaleString('pt-BR', { 
                                minimumFractionDigits: 3, 
                                maximumFractionDigits: 3 
                            })} kg
                        </td>
                        <td>
                            ${Number(p.netWeight).toLocaleString('pt-BR', { 
                                minimumFractionDigits: 3, 
                                maximumFractionDigits: 3 
                            })} kg
                        </td>
                        <td>
                            <button class="btn btn-sm btn-warning me-2"
                                onclick="editarProduto(${p.id})">
                                Editar
                            </button>

                            <button class="btn btn-sm btn-danger"
                                onclick="deletarProduto(${p.id})">
                                Excluir
                            </button>
                        </td>
                    </tr>
                `);
            });

            montarPaginacao(totalPages, page);
        },
        error: function () {
            alert("Erro ao carregar produtos");
        }
    });
}


function montarPaginacao(totalPages, pageAtual) {

    $("#paginacao").empty();

    for (let i = 1; i <= totalPages; i++) {

        $("#paginacao").append(`
            <li class="page-item ${i === pageAtual ? "active" : ""}">
                <a class="page-link" href="#">${i}</a>
            </li>
        `);
    }

    $(".page-link").click(function (e) {
        e.preventDefault();
        const page = parseInt($(this).text());
        currentPage = page;
        carregarProdutos(page);
    });
}

</script>

</body>
</html>
