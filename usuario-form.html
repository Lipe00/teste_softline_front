<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Softline :: Usuário</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="js/API_KEY.js"></script>
</head>

<body class="bg-light">

<div id="navbar-container"></div>

<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 id="titulo-form">Cadastrar Usuário</h4>
            <hr>

            <form id="form-usuario" autocomplete="off">

                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" id="name" autocomplete="off" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" autocomplete="off"  required>
                </div>

                <button type="submit" class="btn btn-success">Salvar</button>
                <button type="button" class="btn btn-secondary"
                        onclick="window.location.href='usuarios.html'">
                    Cancelar
                </button>

            </form>

        </div>
    </div>

</div>

<script src="./js/api.js"></script>
<script>

// ======================
// Variáveis globais
// ======================
const token = localStorage.getItem("token");
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const API_URL = API_BASE + "/User";

// ======================
// Inicialização
// ======================
$(document).ready(function () {

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    $("#navbar-container").load("navbar.html");

    if (id) {
        $("#titulo-form").text("Editar Usuario");
        carregarUsuario(id);
    }

    $("#form-usuario").submit(function (e) {
        e.preventDefault();

        if (id) {
            atualizarUsuario(id);
        } else {
            criarUsuario();
        }
    });

    
});

// ======================
// Funções
// ======================

function carregarUsuario(id) {

    $.ajax({
        url: API_URL + "/" + id,
        type: "GET",
        success: function (c) {
            $("#name").val(c.name);
        },
        error: function () {
            alert("Erro ao carregar usuario");
        }
    });
}

function criarUsuario() {

    const usuario = pegarDadosFormulario();

    $.ajax({
        url: API_URL,
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(usuario),
        success: function () {
            alert("Usuario cadastrado com sucesso!");
            window.location.href = "usuarios.html";
        },
        error: function () {
            alert("Erro ao cadastrar usuario.");
        }
    });
}


function atualizarUsuario(id) {

    const usuario = pegarDadosFormulario();

    $.ajax({
        url: API_URL + "/" + id,
        type: "PUT",
        contentType: "application/json",
        data: JSON.stringify(usuario),
        success: function () {
            alert("Usuario atualizado com sucesso!");
            window.location.href = "usuarios.html";
        },
        error: function () {
            alert("Erro ao atualizar usuario.");
        }
    });
}


function pegarDadosFormulario() {

    return {
        name: $("#name").val(),
        password: $("#password").val(),
    };
}

$(document).ajaxError(function (event, xhr) {
    if (xhr.status === 401) {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }
});

</script>

</body>
</html>
