<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Softline :: Usuários</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="js/API_KEY.js"></script>

</head>

<body class="bg-light">
    <div id="navbar-container"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Lista de Usuários</h3>
        <button class="btn btn-primary"
            onclick="window.location.href='usuario-form.html'">
            + Novo Usuário
        </button>
    </div>
    

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-hover table-bordered align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Id</th>
                        <th>Username</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-usuarios">
                </tbody>
            </table>

            <nav>
                <ul class="pagination justify-content-center" id="paginacao"></ul>
            </nav>

        </div>
    </div>

</div>

<script src="./js/api.js"></script>
<script>


const token = localStorage.getItem("token");
const pageSize = 15;
let currentPage = 1;



$(document).ready(function () {

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    $("#navbar-container").load("navbar.html");

    carregarUsuarios(currentPage);
});


function editarUsuario(id) {
    window.location.href = "usuario-form.html?id=" + id;
}


function deletarUsuario(id) {

    if (!confirm("Tem certeza que deseja excluir este usuario?"))
        return;

    $.ajax({
        url: API_BASE + "/User/" + id,
        type: "DELETE",
        success: function () {
            alert("Usuario excluído com sucesso!");
            carregarUsuarios(currentPage);
        },
        error: function () {
            alert("Erro ao excluir usuario.");
        }
    });
}


function carregarUsuarios(page) {

    $.ajax({
        url: API_BASE + "/User/paged?page=" + page + "&pageSize=" + pageSize,
        type: "GET",
        success: function (response) {

            const usuarios = response.data || response;
            const totalPages = response.totalPages || 1;

            $("#tabela-usuarios").empty();

            usuarios.forEach(u => {
                $("#tabela-usuarios").append(`
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.name}</td>
                       
                        <td>
                            <button class="btn btn-sm btn-warning me-2"
                                onclick="editarUsuario(${u.id})">
                                Editar
                            </button>

                            <button class="btn btn-sm btn-danger"
                                onclick="deletarUsuario(${u.id})">
                                Excluir
                            </button>
                        </td>
                    </tr>
                `);
            });

            montarPaginacao(totalPages, page);
        },
        error: function () {
            alert("Erro ao carregar usuarios");
        }
    });
}


function montarPaginacao(totalPages, pageAtual) {

    $("#paginacao").empty();

    for (let i = 1; i <= totalPages; i++) {

        $("#paginacao").append(`
            <li class="page-item ${i === pageAtual ? "active" : ""}">
                <a class="page-link" href="#">${i}</a>
            </li>
        `);
    }

    $(".page-link").click(function (e) {
        e.preventDefault();
        const page = parseInt($(this).text());
        currentPage = page;
        carregarUsuarios(page);
    });
}
$(document).ajaxError(function (event, xhr) {
    if (xhr.status === 401) {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }
});
</script>

</body>
</html>
